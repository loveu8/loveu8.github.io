<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noosa 行程 2026/07/04-05</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="map-chip-panel" id="mapChipPanel">
  <div class="chip-strip" id="chipStrip"></div>
  <div class="top-actions">
    <button class="lang-toggle" type="button" id="langToggle" aria-label="Switch language">EN</button>
    <button class="theme-toggle" type="button" id="themeToggle" aria-label="切換深色模式" title="切換深色模式">◐</button>
  </div>
</div>

<div class="app">
  <div class="map-panel" id="mapPanel">
    <div class="map-loading" id="mapLoading" aria-live="polite">
      <span class="map-loading-spinner"></span>
      <span id="mapLoadingText">地圖更新中</span>
    </div>
  </div>

  <div class="resize-divider" id="resizeDivider" title="拖曳調整地圖與行程寬度"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-sticky">
      <div class="sheet-handle" id="sheetHandle">
        <div class="handle-bar"></div>
        <span class="handle-hint" id="handleHint">▲ 查看行程</span>
      </div>

      <div class="sidebar-header" id="sidebarHeader">
        <div class="sidebar-title-wrap">
          <span class="s-emoji">🌊</span>
          <div>
            <div class="sidebar-name" id="tripTitle">NOOSA 週末行程</div>
            <div class="sidebar-sub" id="tripSubtitle">2026/07/04-05 · 全程自駕 · 素食友善</div>
          </div>
        </div>
        <button class="print-btn" id="printBtn" type="button">🖨️ 列印</button>
      </div>

      <div class="day-tabs" id="dayTabs"></div>
    </div>

    <div class="sidebar-body" id="sidebarBody"></div>
  </aside>
</div>

<div id="mapToast" class="map-toast">↓ 地圖已更新，收起行程可查看</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="script.js" defer></script>
</body>
</html>
